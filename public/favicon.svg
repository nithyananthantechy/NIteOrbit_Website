<svg
  width="512"
  height="512"
  viewBox="0 0 220 220"
  xmlns="http://www.w3.org/2000/svg"
>
  <rect width="220" height="220" fill="#02080F" rx="30" />
  
  <g transform="translate(110,110)">
    <g transform="rotate(-22)">
      <ellipse
        cx="0" cy="0" rx="60" ry="32"
        fill="none"
        stroke="#4F8FFF"
        strokeWidth="6"
      />
      <!-- Satellite / planet dot -->
      <circle cx="42" cy="22.5" r="10" fill="#FFB830"/>
      <circle cx="42" cy="22.5" r="6" fill="#FFD060" fillOpacity="0.5"/>
    </g>
    
    <!-- Tick marks -->
    <line x1="-42" y1="-32" x2="-54" y2="-44" stroke="#4F8FFF" strokeWidth="4" strokeLinecap="round"/>
    <line x1="-16" y1="-44" x2="-22" y2="-58" stroke="#4F8FFF" strokeWidth="4" strokeLinecap="round"/>
    <line x1="0"   y1="-44" x2="0"   y2="-58" stroke="#4F8FFF" strokeWidth="4" strokeLinecap="round"/>
    <line x1="16"  y1="-40" x2="22"  y2="-54" stroke="#4F8FFF" strokeWidth="4" strokeLinecap="round"/>
    <line x1="38"  y1="-28" x2="50"  y2="-40" stroke="#4F8FFF" strokeWidth="4" strokeLinecap="round"/>
    <line x1="-58" y1="-18" x2="-72" y2="-24" stroke="#4F8FFF" strokeWidth="3" strokeLinecap="round" strokeOpacity="0.7"/>
  </g>
</svg>